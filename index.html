<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Febri Ardiansyah | Portfolio</title>
    <meta name="description"
        content="Portfolio Personal Muhammad Febri Ardiansyah - Developer Coding & Creative Enthusiast">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="bg-mesh"></div>

    <main class="bento-container">

        <!-- Hero Card -->
        <div class="bento-card card-large delay-1">
            <span class="label">SYSTEM_IDENTIFICATION</span>
            <div class="hero-photo-container">
                <img src="febri_photo.jpg" alt="Muhammad Febri Ardiansyah" class="hero-photo">
            </div>
            <h1 class="hero-title">Muhammad<br>Febri Ardiansyah</h1>
        </div>

        <!-- Experience Card -->
        <div class="bento-card card-medium delay-2">
            <span class="label">PROJECT_EXPERIENCE</span>
            <p class="about-text">
                - Laravel
                <br>
                - Flutter
                <br>
                - HTML/CSS

            </p>
        </div>

        <!-- Skills Card -->
        <div class="bento-card card-tall delay-3">
            <span class="label">SKILL</span>
            <div class="skill-list">
                <div class="skill-item"><i class="fas fa-mobile-alt"></i> Flutter</div>
                <div class="skill-item"><i class="fab fa-html5"></i> HTML/CSS</div>
                <div class="skill-item"><i class="fab fa-js"></i> JavaScript</div>
            </div>
        </div>

        <!-- Instagram Card -->
        <div class="bento-card card-small delay-4">
            <span class="label">INSTA</span>
            <div class="social-links-grid">
                <a href="#" class="social-link instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <!-- GitHub Card -->
        <div class="bento-card card-small delay-5">
            <span class="label">GIT</span>
            <div class="social-links-grid">
                <a href="#" class="social-link github"><i class="fab fa-github"></i></a>
            </div>
        </div>

        <!-- Status Card -->
        <div class="bento-card card-medium delay-6">
            <span class="label">CURRENT_STATUS</span>
            <p class="status-text">AVAILABLE FOR<br>INNOVATION_</p>
            <p style="color: var(--text-secondary); margin-top: 12px; font-size: 0.9rem;">
                Siap berkolaborasi dalam proyek luar biasa selanjutnya.
            </p>
        </div>

        <!-- Email Card -->
        <div class="bento-card card-small delay-2">
            <span class="label">EMAIL</span>
            <div class="social-links-grid">
                <a href="mailto:contact@febri.com" class="social-link email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>

    </main>

    <footer
        style="margin-top: 80px; text-align: center; color: rgba(255,255,255,0.2); font-size: 0.7rem; letter-spacing: 4px; font-weight: 700; text-transform: uppercase;">
        &copy; 2024 FEBRI.SYS // ALL SYSTEMS OPERATIONAL
    </footer>

</body>

</html>
